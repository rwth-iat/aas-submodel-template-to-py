name: Regenerate published submodels

on:
  push:
    branches:
      - master
    paths:
      - "aas-submodel-to-py/**"
      - ".github/workflows/regenerate-submodels.yml"
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  regenerate-submodels:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      # Newline-separated paths relative to published/ to skip during generation.
      SKIP_SUBMODELS: |
        Creation and Classification of Materials/1/0/IDTA 02034-1-0 Template_BackendSpecificMaterialInformation.json
        Digital Battery Passport/4_Technical Data/1/0/IDTA 02035-4_DBP-Part-4_TechnicalData.json
        Digital Battery Passport/4_Technical Data/1/0/IDTA 02035-4_DBP-Part-4_TechnicalData_without_examplevalues.json
        Digital nameplate/3/0/IDTA 02006-3-0_Template_Digital Nameplate.json
        Handover Documentation/2/0/IDTA 02004-2-0_Example_HandoverDocumentation.json
        Material Data for Plastic Waste/1/0/IDTA_02080_Template_Material Data for Plastic Waste.json
        Plant Asset Management Specification Sheet/1/0/IDTA 02019-1-0_Template_PlantAssetManagement.json
        Technical Data for Automated Guided Vehicles/1/0/1/IDTA 02047-1-0-1 Template_TechnicalDataForAGV.json
        Technical Data for Automated Guided Vehicles/1/0/1/IDTA 02047-1-0-1 Template_TechnicalDataForAGV_forAASMetamodelV3.1.json
        Technical Data for Automated Guided Vehicles/1/0/IDTA 02047-1-0 Template_TechnicalDataForAGV.json
        Technical_Data/2/0/IDTA 02003_Sample_TechnicalData.json

    steps:
      - name: Get upstream templates hash
        id: upstream
        run: |
          HASH=$(git ls-remote https://github.com/admin-shell-io/submodel-templates.git refs/heads/main | cut -f1)
          echo "hash=${HASH}" >> $GITHUB_OUTPUT

      - name: Check upstream hash cache
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/.upstream-hash-marker
          key: upstream-hash-${{ steps.upstream.outputs.hash }}

      - name: Checkout repository
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install generator package
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ./aas-submodel-to-py

      - name: Regenerate submodels from published templates
        if: steps.cache.outputs.cache-hit != 'true'
        id: regenerate
        continue-on-error: true
        run: python py-aas-submodels/regenerate_submodels.py --fail-on-errors --log-file /tmp/generation_failures.log

      - name: Write hash marker for cache
        if: steps.cache.outputs.cache-hit != 'true' && steps.regenerate.outcome == 'success'
        run: echo "${{ steps.upstream.outputs.hash }}" > /tmp/.upstream-hash-marker

      - name: Upload failure log as artifact
        if: steps.cache.outputs.cache-hit != 'true' && steps.regenerate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: generation-failures
          path: /tmp/generation_failures.log

      - name: Commit generated changes
        if: always() && steps.cache.outputs.cache-hit != 'true'
        run: |
          TARGET_BRANCH="${GITHUB_REF_NAME:-master}"
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A py-aas-submodels
            if [[ -n "$(git diff --cached --name-only)" ]]; then
              echo "Staged files:"
              git diff --cached --name-only
              git commit -m "chore: regenerate published submodels"
              git push origin "HEAD:${TARGET_BRANCH}"
            else
              echo "No staged changes to commit."
            fi
          else
            echo "No changes to commit."
          fi

      - name: Fail workflow if regeneration had errors
        if: always() && steps.cache.outputs.cache-hit != 'true' && steps.regenerate.outcome == 'failure'
        run: |
          echo "Regeneration completed with errors. See the 'generation-failures' artifact for details."
          exit 1
